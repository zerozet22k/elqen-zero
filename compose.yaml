name: elqen-zero-local

services:
  mongo:
    image: mongo:7
    container_name: elqen-zero-mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_DATABASE: ${MONGO_DB:-elqen_zero}
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "mongodb://127.0.0.1:27017/admin", "--eval", "db.runCommand({ ping: 1 }).ok"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

  redis:
    image: redis:7-alpine
    container_name: elqen-zero-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 5s

  server:
    image: elqen-zero-server-local
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: elqen-zero-server
    restart: unless-stopped
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "4000:4000"
    environment:
      PORT: 4000
      CLIENT_URL: ${CLIENT_URL:-http://localhost:3000}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:3000}
      SOCKET_ORIGIN: ${SOCKET_ORIGIN:-http://localhost:3000}
      PUBLIC_WEBHOOK_BASE_URL: ${PUBLIC_WEBHOOK_BASE_URL:-http://localhost:4000}
      MONGO_URL: mongodb://mongo:27017
      MONGO_DB: ${MONGO_DB:-elqen_zero}
      REDIS_URL: redis://redis:6379
      REDIS_REQUIRED: ${REDIS_REQUIRED:-true}
      JWT_SECRET: ${JWT_SECRET:-change-me}
      SESSION_SECRET: ${SESSION_SECRET:-change-me}
      FIELD_ENCRYPTION_KEY: ${FIELD_ENCRYPTION_KEY:-change-me}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      APP_TENANT_MODE: ${APP_TENANT_MODE:-multi}
      ALLOW_SELF_SIGNUP: ${ALLOW_SELF_SIGNUP:-true}
      ALLOW_WORKSPACE_CREATION: ${ALLOW_WORKSPACE_CREATION:-true}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-3.1-flash-lite-preview}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-5.3-codex}
      OPENAI_API_BASE_URL: ${OPENAI_API_BASE_URL:-https://api.openai.com/v1}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_PUBLISHABLE_KEY: ${STRIPE_PUBLISHABLE_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      STRIPE_BILLING_PORTAL_CONFIGURATION_ID: ${STRIPE_BILLING_PORTAL_CONFIGURATION_ID:-}
      META_APP_ID: ${META_APP_ID:-}
      META_APP_SECRET: ${META_APP_SECRET:-}
      META_WEBHOOK_VERIFY_TOKEN: ${META_WEBHOOK_VERIFY_TOKEN:-}
    volumes:
      - server_uploads:/app/uploads
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:4000/health').then((res) => { if (!res.ok) process.exit(1); }).catch(() => process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s

  client:
    image: elqen-zero-client-local
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: elqen-zero-client
    restart: unless-stopped
    depends_on:
      server:
        condition: service_healthy
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/').then((res) => { if (!res.ok) process.exit(1); }).catch(() => process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 15s

volumes:
  mongo_data:
  redis_data:
  server_uploads:
